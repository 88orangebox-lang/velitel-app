<!DOCTYPE html>
<html lang="sk">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e65100">
<title>VELITEĽ: Sklad</title>
<link rel="stylesheet" href="core.css">
<style>
    :root { --primary: #e65100; }

    /* MAPA — dlaždice požiarnych úsekov */
    .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px; padding: 5px; }
    .tile { background: white; border: 2px solid #555; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    .tile-header { background: #ddd; padding: 10px; font-weight: bold; text-align: center; border-bottom: 1px solid #999; cursor: pointer; font-size: 16px; color: black; }
    .tile-header.target-active { background: #ffeb3b !important; border: 2px solid black; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
    .tile-body { padding: 6px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .tile-badges { background: #f9f9f9; border: 1px dashed #ccc; min-height: 34px; border-radius: 4px; }
    .tile-chk-row { display: flex; align-items: center; justify-content: center; gap: 8px; background: #eee; padding: 8px; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .tile-chk-row input { width: 24px; height: 24px; }
    .tile-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .tile-stat-item { text-align: center; }
    .tile-stat-label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 2px; }
    .lbl-red { color: #c62828; } .lbl-green { color: #2e7d32; } .lbl-dark { background: black; color: white; }

    body.dark .tile { background: #222426; border-color: #555; }
    body.dark .tile-badges { background: #1b1d1e; border-color: #444; }
    body.dark .tile-chk-row { background: #2c2e30; }
</style>
</head>
<body>

<div id="setupScreen" class="setup-screen">
    <h1 style="color:var(--primary)" onclick="setupSecretTap()">SKLAD / HALA</h1>
    <div class="setup-scroll">
        <div class="setup-group">
            <label>Adresa / objekt (voliteľné):</label>
            <input type="text" id="inpAddr" placeholder="napr. Priemyselná 5">
            <label>Veliteľ zásahu (voliteľné):</label>
            <input type="text" id="inpCmdr" placeholder="meno a priezvisko">
        </div>
        <div class="setup-group">
            <label>Počet požiarnych úsekov (PÚ):</label>
            <input type="number" id="inpZones" value="10">
        </div>
        <div class="setup-group">
            <label>Kontroly ADP (minúty):</label>
            <div class="int-row">
                <input type="number" id="inpInt1" value="15">
                <input type="number" id="inpInt2" value="20">
                <input type="number" id="inpInt3" value="25">
            </div>
        </div>
        <div class="setup-group" id="testModeWrap" style="display:none">
            <div class="chk-line warn"><input type="checkbox" id="chkTestMode"><label for="chkTestMode">⚡ RÝCHLY TEST (15s)</label></div>
        </div>
        <button class="btn-big btn-green" onclick="appInit()">NOVÝ ZÁSAH (ŠTART)</button>
        <p class="setup-note">Všetky údaje zostávajú len v tomto zariadení.</p>
    </div>
</div>

<div class="tabs">
    <div class="tab active" data-tab="map" onclick="switchTab('map')">MAPA</div>
    <div class="tab" data-tab="forces" onclick="switchTab('forces')">SILY (ADP)</div>
    <div class="tab" data-tab="log" onclick="switchTab('log')">DENNÍK</div>
    <button class="btn-dark" onclick="toggleDark()" title="Denný / nočný režim">🌓</button>
    <div id="sysIndicator" class="sys-status"></div>
</div>

<div class="main-area">
    <div id="viewMap" class="tab-content active">
        <button class="btn-overview" onclick="toggleOverview()">👁️ CELÝ POHĽAD</button>
        <div class="table-wrapper">
            <div id="mapScaleWrapper">
                <div class="base-station" onclick="logicHandleRoomClick('BASE')">
                    <div class="base-title">NÁSTUPNÝ PRIESTOR / ZÁKLADŇA</div>
                    <div id="badges_BASE" class="badge-zone"></div>
                </div>
                <div id="gridContainer"></div>
            </div>
        </div>
    </div>

    <div id="viewForces" class="tab-content">
        <div style="padding:10px; padding-bottom:120px;">
            <button class="btn-big" style="background:#333; margin-bottom:15px;" onclick="addForce()">+ PRIDAŤ SKUPINU</button>
            <div id="forcesList"></div>
        </div>
    </div>

    <div id="viewLog" class="tab-content">
        <div class="log-pad">
            <button class="btn-big btn-primary" onclick="finishIncident()">🏁 UKONČIŤ ZÁSAH A VYTVORIŤ PDF</button>
            <div class="manual-log">
                <input type="text" id="manualLogInput" placeholder="Poznámka do denníka…" onkeydown="if(event.key==='Enter')addManualLog()">
                <button onclick="addManualLog()">ZAPÍSAŤ</button>
            </div>
            <div id="logContent" class="log-content"></div>
            <div class="danger-zone">
                <button class="btn-big" style="background:#444" onclick="exportJSON()">💾 EXPORT DÁT (JSON)</button>
                <button class="btn-big" style="background:#7b1f1f" onclick="forceReset()">🗑️ VYMAZAŤ VŠETKY DÁTA</button>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    <div>PREHĽADANÉ<br><span id="statSearch" class="f-val">0</span></div>
    <div>OSOBY<br><span id="statPers" class="f-val">0</span></div>
    <div class="f-red">ZRANENÍ<br><span id="statInj" class="f-val">0</span></div>
    <div class="f-gray">EXITUS<br><span id="statDead" class="f-val">0</span></div>
    <div class="f-green">EVAKUOVANÍ<br><span id="statEvac" class="f-val">0</span></div>
    <div class="f-blue">ČAS ZÁSAHU<br><span id="statTime" class="f-val">—</span></div>
    <div class="f-orange"><span id="statNextName">KONTROLA O</span><br><span id="statNext" class="f-val">—</span></div>
    <div class="ver">v6.0</div>
</div>

<script src="core.js"></script>
<script>
    function appInit() {
        APP.rooms = {}; APP.groups = []; APP.logs = []; APP.lastId = 0; APP.selectedGroupId = null;
        APP.zones = numVal('inpZones', 10);
        for (let i = 1; i <= APP.zones; i++) dbCreateRoom('PÚ ' + i);
        coreStartIncident();
    }

    function renderMapStructure() {
        let html = '<div class="tile-grid">';
        Object.keys(APP.rooms).forEach(id => {
            const r = APP.rooms[id];
            html += '<div class="tile">' +
                '<div class="tile-header" id="cell_' + id + '" onclick="logicHandleRoomClick(\'' + id + '\')">' + id + '</div>' +
                '<div class="tile-body">' +
                    '<div id="zone_' + id + '" class="badge-zone tile-badges" onclick="logicHandleRoomClick(\'' + id + '\')"></div>' +
                    '<label class="tile-chk-row"><input type="checkbox" ' + (r.s ? 'checked' : '') + ' onchange="dbUpdateRoom(\'' + id + '\',\'s\',this.checked)"> PREHĽADANÉ</label>' +
                    '<div class="tile-stats">' +
                        '<div class="tile-stat-item"><span class="tile-stat-label">OSOBY</span>' + stepperHTML(id, 'p', r.p, 'sm') + '</div>' +
                        '<div class="tile-stat-item"><span class="tile-stat-label lbl-red">ZRANENÍ</span>' + stepperHTML(id, 'i', r.i, 'sm inp-red') + '</div>' +
                        '<div class="tile-stat-item"><span class="tile-stat-label lbl-green">EVAK.</span>' + stepperHTML(id, 'e', r.e, 'sm inp-green') + '</div>' +
                        '<div class="tile-stat-item"><span class="tile-stat-label lbl-dark">EXITUS</span>' + stepperHTML(id, 'd', r.d, 'sm inp-dark') + '</div>' +
                    '</div>' +
                '</div></div>';
        });
        document.getElementById('gridContainer').innerHTML = html + '</div>';
        Object.keys(APP.rooms).forEach(tintHeader);
    }

    function tintHeader(id) {
        const h = document.getElementById('cell_' + id);
        if (h) h.style.backgroundColor = APP.rooms[id].s ? '#a5d6a7' : '#ddd';
    }

    function highlightTargets() {
        document.querySelectorAll('.tile-header').forEach(e => e.classList.remove('target-active'));
        const g = APP.selectedGroupId ? findG(APP.selectedGroupId) : null;
        if (g && g.loc !== 'BASE') {
            const c = document.getElementById('cell_' + g.loc);
            if (c) c.classList.add('target-active');
        }
    }

    function reportDetail() {
        let rt = '';
        for (const k in APP.rooms) {
            const r = APP.rooms[k];
            if (r.s || r.p > 0 || r.i > 0 || r.d > 0 || r.e > 0) {
                rt += '<tr><td>' + k + '</td><td>' + (r.s ? 'ÁNO' : '—') + '</td><td>' + r.p + '</td><td>' + r.i + '</td><td>' + r.d + '</td><td>' + r.e + '</td></tr>';
            }
        }
        if (!rt) rt = '<tr><td colspan="6">Bez záznamov</td></tr>';
        return '<table class="rep-table"><thead><tr><th>Úsek</th><th>Prehľadané</th><th>Osoby</th><th>Zranení</th><th>Exitus</th><th>Evak.</th></tr></thead><tbody>' + rt + '</tbody></table>';
    }

    coreSetup({
        key: 'VELITEL_SKLAD_V11',
        legacyKeys: ['DATA_SKLAD_V10_FINAL'],
        typeLabel: 'Sklad / Hala',
        baseLoc: 'BASE',
        defaults: { zones: 10 },
        renderMap: renderMapStructure,
        badgeContainer: loc => loc === 'BASE' ? 'badges_BASE' : 'zone_' + loc,
        highlightTargets: highlightTargets,
        onRoomUpdated: (id, f) => { if (f === 's') tintHeader(id); },
        reportDetail: reportDetail
    });
</script>

</body>
</html>
