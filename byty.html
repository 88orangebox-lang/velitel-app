<!DOCTYPE html>
<html lang="sk">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#d32f2f">
<title>VELITEĽ: Bytový dom</title>
<link rel="stylesheet" href="core.css">
<style>
    :root { --primary: #d32f2f; }

    /* MAPA — tabuľka bytov */
    #mapScaleWrapper { max-width: 780px; margin: 0 auto; }
    table.grid-table { width: 100%; min-width: 640px; border-collapse: collapse; background: white; table-layout: fixed; margin-bottom: 20px; }
    .grid-table th { background: #333; color: white; padding: 10px 2px; font-size: 12px; position: sticky; top: 0; z-index: 10; }
    .grid-table td { border: 1px solid #999; padding: 4px 2px; text-align: center; vertical-align: middle; }
    .floor-header { background: #ddd; font-weight: bold; text-align: left; padding-left: 10px !important; font-size: 15px; border-top: 2px solid #444; color: black; }
    .room-id { font-weight: bold; color: var(--blue); text-decoration: underline; cursor: pointer; font-size: 17px; background: #fff; }
    .room-id.active { background: #ffeb3b !important; border: 3px solid black; color: #000; }
    .cell-chk { width: 28px; height: 28px; }

    body.dark .grid-table { background: #222426; }
    body.dark .grid-table td { border-color: #555; }
    body.dark .room-id { background: #222426; }
</style>
</head>
<body>

<div id="setupScreen" class="setup-screen">
    <h1 style="color:var(--primary)" onclick="setupSecretTap()">BYTOVÝ DOM</h1>
    <div class="setup-scroll">
        <div class="setup-group">
            <label>Adresa / objekt (voliteľné):</label>
            <input type="text" id="inpAddr" placeholder="napr. Hlavná 12">
            <label>Veliteľ zásahu (voliteľné):</label>
            <input type="text" id="inpCmdr" placeholder="meno a priezvisko">
        </div>
        <div class="setup-group">
            <label>Počet poschodí:</label>
            <input type="number" id="inpFloors" value="8">
            <label>Bytov na poschodí:</label>
            <input type="number" id="inpApts" value="3">
            <div class="chk-line"><input type="checkbox" id="chkSut"><label for="chkSut">Suterén</label></div>
            <div class="chk-line"><input type="checkbox" id="chkGar"><label for="chkGar">Garáž</label></div>
        </div>
        <div class="setup-group">
            <label>Kontroly ADP (minúty):</label>
            <div class="int-row">
                <input type="number" id="inpInt1" value="15">
                <input type="number" id="inpInt2" value="20">
                <input type="number" id="inpInt3" value="25">
            </div>
        </div>
        <div class="setup-group" id="testModeWrap" style="display:none">
            <div class="chk-line warn"><input type="checkbox" id="chkTestMode"><label for="chkTestMode">⚡ RÝCHLY TEST (15s)</label></div>
        </div>
        <button class="btn-big btn-green" onclick="appInit()">NOVÝ ZÁSAH (ŠTART)</button>
        <p class="setup-note">Všetky údaje zostávajú len v tomto zariadení.</p>
    </div>
</div>

<div class="tabs">
    <div class="tab active" data-tab="map" onclick="switchTab('map')">MAPA</div>
    <div class="tab" data-tab="forces" onclick="switchTab('forces')">SILY (ADP)</div>
    <div class="tab" data-tab="log" onclick="switchTab('log')">DENNÍK</div>
    <button class="btn-dark" onclick="toggleDark()" title="Denný / nočný režim">🌓</button>
    <div id="sysIndicator" class="sys-status"></div>
</div>

<div class="main-area">
    <div id="viewMap" class="tab-content active">
        <button class="btn-overview" onclick="toggleOverview()">👁️ CELÝ POHĽAD</button>
        <div class="table-wrapper">
            <div id="mapScaleWrapper">
                <div class="base-station">
                    <div class="base-title">NÁSTUPNÝ PRIESTOR / ZÁKLADŇA</div>
                    <div id="zone_BASE" class="badge-zone" onclick="logicHandleRoomClick('BASE')"></div>
                </div>
                <div id="gridContainer"></div>
            </div>
        </div>
    </div>

    <div id="viewForces" class="tab-content">
        <div style="padding:10px; padding-bottom:120px;">
            <button class="btn-big" style="background:#333; margin-bottom:15px;" onclick="addForce()">+ PRIDAŤ SKUPINU</button>
            <div id="forcesList"></div>
        </div>
    </div>

    <div id="viewLog" class="tab-content">
        <div class="log-pad">
            <button id="btnFinish" class="btn-big btn-primary" onclick="finishIncident()">🏁 UKONČIŤ ZÁSAH A VYTVORIŤ PDF</button>
            <button id="btnNew" class="btn-big btn-green" style="display:none" onclick="newIncident()">🆕 NOVÝ ZÁSAH</button>
            <div class="manual-log">
                <input type="text" id="manualLogInput" placeholder="Poznámka do denníka…" onkeydown="if(event.key==='Enter')addManualLog()">
                <button onclick="addManualLog()">ZAPÍSAŤ</button>
            </div>
            <div id="logContent" class="log-content"></div>
            <div class="danger-zone">
                <button class="btn-big" style="background:#444" onclick="exportJSON()">💾 EXPORT DÁT (JSON)</button>
                <button class="btn-big" style="background:#7b1f1f" onclick="forceReset()">🗑️ VYMAZAŤ VŠETKY DÁTA</button>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    <div>PREHĽADANÉ<br><span id="statSearch" class="f-val">0</span></div>
    <div>OSOBY<br><span id="statPers" class="f-val">0</span></div>
    <div class="f-red">ZRANENÍ<br><span id="statInj" class="f-val">0</span></div>
    <div class="f-gray">EXITUS<br><span id="statDead" class="f-val">0</span></div>
    <div class="f-green">EVAKUOVANÍ<br><span id="statEvac" class="f-val">0</span></div>
    <div class="f-blue">ČAS ZÁSAHU<br><span id="statTime" class="f-val">—</span></div>
    <div class="f-orange"><span id="statNextName">KONTROLA O</span><br><span id="statNext" class="f-val">—</span></div>
    <div class="ver">v6.0</div>
</div>

<script src="core.js"></script>
<script>
    function appInit() {
        APP.rooms = {}; APP.groups = []; APP.logs = []; APP.lastId = 0; APP.selectedGroupId = null;
        APP.floors = numVal('inpFloors', 8);
        APP.apts = numVal('inpApts', 3);
        for (let f = APP.floors; f >= 1; f--) {
            for (let a = 1; a <= APP.apts; a++) dbCreateRoom(f + '.' + a);
        }
        if (document.getElementById('chkGar').checked) dbCreateRoom('GAR');
        if (document.getElementById('chkSut').checked) dbCreateRoom('SUT');
        coreStartIncident();
    }

    function rowHTML(id) {
        const r = APP.rooms[id];
        return '<tr>' +
            '<td class="room-id" id="cell_' + id + '" onclick="logicHandleRoomClick(\'' + id + '\')">' + id + '</td>' +
            '<td id="badge_' + id + '" class="badge-zone" onclick="logicHandleRoomClick(\'' + id + '\')"></td>' +
            '<td><input type="checkbox" class="cell-chk" ' + (r.s ? 'checked' : '') + ' onchange="dbUpdateRoom(\'' + id + '\',\'s\',this.checked)"></td>' +
            '<td><input type="checkbox" class="cell-chk" ' + (r.k ? 'checked' : '') + ' onchange="dbUpdateRoom(\'' + id + '\',\'k\',this.checked)"></td>' +
            '<td>' + stepperHTML(id, 'p', r.p, 'sm') + '</td>' +
            '<td>' + stepperHTML(id, 'i', r.i, 'sm inp-red') + '</td>' +
            '<td>' + stepperHTML(id, 'd', r.d, 'sm inp-dark') + '</td>' +
            '<td>' + stepperHTML(id, 'e', r.e, 'sm inp-green') + '</td>' +
        '</tr>';
    }

    function renderMapStructure() {
        let h = '<table class="grid-table">' +
            '<colgroup><col style="width:10%"><col style="width:20%"><col style="width:7%"><col style="width:7%"><col style="width:14%"><col style="width:14%"><col style="width:14%"><col style="width:14%"></colgroup>' +
            '<thead><tr><th>BYT</th><th>JEDNOTKY</th><th>✔</th><th>🔑</th><th>OSOBY</th><th>ZRAN.</th><th>EXIT.</th><th>EVAK.</th></tr></thead><tbody>';
        for (let f = APP.floors; f >= 1; f--) {
            h += '<tr><td colspan="8" class="floor-header" id="floor_' + f + '">' + f + '. POSCHODIE</td></tr>';
            for (let a = 1; a <= APP.apts; a++) h += rowHTML(f + '.' + a);
        }
        if (APP.rooms['GAR']) h += '<tr><td colspan="8" class="floor-header">GARÁŽE</td></tr>' + rowHTML('GAR');
        if (APP.rooms['SUT']) h += '<tr><td colspan="8" class="floor-header">SUTERÉN</td></tr>' + rowHTML('SUT');
        document.getElementById('gridContainer').innerHTML = h + '</tbody></table>';
        updateFloorColors();
    }

    function updateFloorColors() {
        for (let f = 1; f <= APP.floors; f++) {
            const el = document.getElementById('floor_' + f);
            if (!el) continue;
            let tot = 0, ok = 0;
            for (let a = 1; a <= APP.apts; a++) {
                const r = APP.rooms[f + '.' + a];
                if (r) { tot++; if (r.s) ok++; }
            }
            el.innerText = f + '. POSCHODIE — prehľadané ' + ok + '/' + tot;
            el.style.background = (tot > 0 && ok === tot) ? '#a5d6a7' : (ok > 0 ? '#fff59d' : '#ddd');
        }
    }

    function highlightTargets() {
        document.querySelectorAll('.room-id').forEach(e => e.classList.remove('active'));
        const g = APP.selectedGroupId ? findG(APP.selectedGroupId) : null;
        if (g && g.loc !== 'BASE') {
            const c = document.getElementById('cell_' + g.loc);
            if (c) c.classList.add('active');
        }
    }

    function reportDetail() {
        let rt = '';
        for (const k in APP.rooms) {
            const r = APP.rooms[k];
            if (r.s || r.k || r.p > 0 || r.i > 0 || r.d > 0 || r.e > 0) {
                rt += '<tr><td>' + k + '</td><td>' + (r.s ? 'ÁNO' : '—') + '</td><td>' + (r.k ? 'ÁNO' : '—') + '</td><td>' + r.p + '</td><td>' + r.i + '</td><td>' + r.d + '</td><td>' + r.e + '</td></tr>';
            }
        }
        if (!rt) rt = '<tr><td colspan="7">Bez záznamov</td></tr>';
        return '<table class="rep-table"><thead><tr><th>Priestor</th><th>Prehľadané</th><th>Kľúče</th><th>Osoby</th><th>Zranení</th><th>Exitus</th><th>Evak.</th></tr></thead><tbody>' + rt + '</tbody></table>';
    }

    coreSetup({
        key: 'VELITEL_BYTY_V6',
        legacyKeys: ['DATA_TREZOR_BYTY_V5'],
        typeLabel: 'Bytový dom',
        baseLoc: 'BASE',
        defaults: { floors: 8, apts: 3 },
        renderMap: renderMapStructure,
        badgeContainer: loc => loc === 'BASE' ? 'zone_BASE' : 'badge_' + loc,
        highlightTargets: highlightTargets,
        onRoomUpdated: (id, f) => { if (f === 's') updateFloorColors(); },
        reportDetail: reportDetail
    });
</script>

</body>
</html>
